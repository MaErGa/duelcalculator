<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Duelo - Yu-Gi-Oh!</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="lpTickSound" src="assets/lp_tick.mp3" preload="auto"></audio>
<audio id="lpFinishSound" src="assets/lp_finish.mp3" preload="auto"></audio>

<div class="app">

  <header class="top-bar">
    <h1>Calculadora de Duelo</h1>
    <button id="resetBtn" class="reset-btn" title="Reiniciar duelo">⟲ Reiniciar</button>
  </header>

  <main class="board">

    <!-- JUGADOR 1 -->
    <section class="player player-1">
      <div class="player-header">
        <input type="text" class="player-name" value="Jugador 1" maxlength="16">
      </div>

      <div class="lp-display">
        <div class="lp-counter" id="lp1">8000</div>
      </div>

      <div class="controls">
        <div class="quick-buttons">
          <button class="btn plus" data-player="1" data-amount="1000">+1000</button>
          <button class="btn plus" data-player="1" data-amount="500">+500</button>
          <button class="btn plus" data-player="1" data-amount="100">+100</button>
        </div>
        <div class="quick-buttons">
          <button class="btn minus" data-player="1" data-amount="-1000">-1000</button>
          <button class="btn minus" data-player="1" data-amount="-500">-500</button>
          <button class="btn minus" data-player="1" data-amount="-100">-100</button>
        </div>
        <div class="manual-row">
          <input type="number" class="manual-input" id="manual1" placeholder="Cantidad">
          <button class="btn manual-add" data-player="1">Sumar</button>
          <button class="btn manual-sub" data-player="1">Restar</button>
        </div>

        <div class="history-box">
          <div class="history-title">Historial</div>
          <ul class="history-list" id="history1"></ul>
        </div>
      </div>
    </section>

    <!-- ZONA CENTRAL -->
    <section class="center-zone">
      <div class="randomizers">
        <div class="randomizer-block">
          <div class="coin-wrap">
            <div class="coin" id="coin">
              <div class="coin-face coin-front"><img src="assets/coin_face1.png" alt="Cara"></div>
              <div class="coin-face coin-back"><img src="assets/coin_face2.png" alt="Cruz"></div>
            </div>
          </div>
          <button id="coinFlipBtn" class="coin-btn">🪙 Moneda</button>
        </div>

        <div class="randomizer-block">
          <div class="die-wrap">
            <div class="die" id="die">
              <div class="die-face die-1"><span class="pip"></span></div>
              <div class="die-face die-2"><span class="pip"></span><span class="pip"></span></div>
              <div class="die-face die-3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
              <div class="die-face die-4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
              <div class="die-face die-5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
              <div class="die-face die-6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            </div>
          </div>
          <button id="diceRollBtn" class="dice-btn">🎲 Dado</button>
        </div>
      </div>

      <div class="coin-result" id="coinResult"></div>

      <div class="start-lp">
        <label for="startLp">LP inicial:</label>
        <input type="number" id="startLp" value="8000" step="100">
        <button id="applyStartLp" class="btn apply-start">Aplicar</button>
      </div>
    </section>

    <!-- JUGADOR 2 -->
    <section class="player player-2">
      <div class="player-header">
        <input type="text" class="player-name" value="Jugador 2" maxlength="16">
      </div>

      <div class="lp-display">
        <div class="lp-counter" id="lp2">8000</div>
      </div>

      <div class="controls">
        <div class="quick-buttons">
          <button class="btn plus" data-player="2" data-amount="1000">+1000</button>
          <button class="btn plus" data-player="2" data-amount="500">+500</button>
          <button class="btn plus" data-player="2" data-amount="100">+100</button>
        </div>
        <div class="quick-buttons">
          <button class="btn minus" data-player="2" data-amount="-1000">-1000</button>
          <button class="btn minus" data-player="2" data-amount="-500">-500</button>
          <button class="btn minus" data-player="2" data-amount="-100">-100</button>
        </div>
        <div class="manual-row">
          <input type="number" class="manual-input" id="manual2" placeholder="Cantidad">
          <button class="btn manual-add" data-player="2">Sumar</button>
          <button class="btn manual-sub" data-player="2">Restar</button>
        </div>

        <div class="history-box">
          <div class="history-title">Historial</div>
          <ul class="history-list" id="history2"></ul>
        </div>
      </div>
    </section>

  </main>

  <div class="victory-overlay" id="victoryOverlay">
    <div class="victory-card">
      <div class="victory-label">¡Duelo Terminado!</div>
      <div class="victory-name" id="victoryName">Jugador 1</div>
      <div class="victory-sub">HA GANADO</div>
      <button id="victoryRestartBtn" class="btn apply-start victory-btn">Nuevo Duelo</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
